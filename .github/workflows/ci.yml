name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Lint skills
        run: python scripts/lint_skills.py
      - name: Build catalog
        run: python scripts/build_catalog.py
      - name: Run tests
        run: python -m pytest -q

